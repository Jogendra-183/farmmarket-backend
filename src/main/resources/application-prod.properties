# ==============================
# FarmMarket Production Configuration
# ==============================
# This file uses environment variables for deployment

# Server
server.port=${PORT:8080}
server.servlet.context-path=/

# ==============================
# MySQL Database Configuration (Railway)
# ==============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.pool-name=FarmMarketPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=${JWT_SECRET:farmMarketSuperSecretKey2026FarmMarketSuperSecretKey2026FarmMarket}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ==============================
# Logging (Production)
# ==============================
logging.level.com.farmmarket=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ==============================
# File Upload
# ==============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================
# Email Configuration (Gmail SMTP)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==============================
# OTP Configuration
# ==============================
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.otp.resend-cooldown-seconds=30

# ==============================
# CORS Configuration
# ==============================
app.cors.allowed-origins=${CORS_ORIGINS:https://your-frontend.vercel.app}
