# ==============================
# FarmMarket Backend Configuration
# ==============================
spring.config.import=optional:env

# Server
server.port=8080
server.servlet.context-path=/

# ==============================
# MySQL Database Configuration
# ==============================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.pool-name=FarmMarketPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.use_sql_comments=true

# ==============================
# JWT Configuration
# ==============================
app.jwt.secret=farmMarketSuperSecretKey2026FarmMarketSuperSecretKey2026FarmMarket
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ==============================
# Logging
# ==============================
logging.level.com.farmmarket=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# ==============================
# File Upload
# ==============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================
# Email Configuration (Gmail SMTP)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=jogendrasai780@gmail.com
spring.mail.password=xkkhegyuvicdxsyb
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==============================
# OTP Configuration
# ==============================
app.otp.expiry-minutes=5
app.otp.max-attempts=3
app.otp.resend-cooldown-seconds=30
